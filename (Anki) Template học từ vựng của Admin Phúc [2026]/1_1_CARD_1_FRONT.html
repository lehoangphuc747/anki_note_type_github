    <main class="card-content">
      <!-- Từ vựng tiếng Hàn (chế độ gõ đáp án) -->
      <div class="tuvung">
        <!-- Input wrapper với overlay real-time -->
        <div class="type-input-wrapper">
          {{type:word}}
          <!-- Overlay hiển thị real-time check ngay trong input -->
          <div id="typeans-overlay" class="typeans-overlay">
            <span><span class="type-placeholder">_</span></span>
          </div>
        </div>
       
        
        <!-- Progress indicator -->
        <div class="type-progress-container">
          <div id="type-progress-bar" class="type-progress-bar"></div>
        </div>
        
        <!-- Dãy biểu thị dấu cách (không chữ): "- - _ - -" -->
        <div id="space-indicators" class="space-indicators" style="display:none" aria-hidden="true"></div>
        
        <!-- Container hiển thị kết quả check real-time (dưới input - backup) -->
        <div id="typeans-display" class="typeans-display"></div>
        
        <!-- Đáp án đúng để check (ẩn, chỉ dùng để so sánh) -->
        <span id="correct-answer" style="display: none;">{{word}}</span>
        
        <!-- Hàng mới chứa Loại từ và Nút Gợi ý -->
        <div class="word-meta-row-front">
            {{#pos}}
            <div class="loaitu">{{pos}}</div>
            {{/pos}}

            <button id="type-hint-button" class="type-hint-button" aria-label="Gợi ý gõ chữ">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12,2A7,7,0,0,0,5,9c0,2.38,1.19,4.47,3,5.74V17a1,1,0,0,0,1,1h6a1,1,0,0,0,1-1V14.74c1.81-1.27,3-3.36,3-5.74A7,7,0,0,0,12,2ZM9,21a1,1,0,0,0,1,1h4a1,1,0,0,0,1-1V20H9Z"/></svg>
            </button>
        </div>
        
      </div>
      
      <!-- CẬP NHẬT: SCRIPT VỚI LOGIC ĐƠN GIẢN NHẤT -->
<!-- DÁN ĐOẠN NÀY VÀO ĐỂ THAY THẾ CHO SCRIPT CŨ -->
<script>
  (function() {
    // Hàm khởi tạo - thử nhiều lần nếu cần
    function initTypeAnswer() {
      var input = document.querySelector('input#typeans');
      var overlay = document.getElementById('typeans-overlay');
      var progressBar = document.getElementById('type-progress-bar');
      var correctAnswerSpan = document.getElementById('correct-answer');
      var hintButton = document.getElementById('type-hint-button');

      // Kiểm tra các element cần thiết
      if (!input || !overlay) {
        // Thử lại sau 50ms nếu chưa có input hoặc overlay
        setTimeout(initTypeAnswer, 50);
        return;
      }

      // Lấy đáp án đúng
      var correctAnswer = '';
      if (correctAnswerSpan) {
        correctAnswer = (correctAnswerSpan.textContent || '').toString().trim();
      }
      
      // Nếu chưa có đáp án, hiển thị placeholder tạm thời
      if (!correctAnswer) {
        overlay.innerHTML = '<span><span class="type-placeholder">_</span></span>';
        // Thử lại sau 100ms để lấy đáp án
        setTimeout(initTypeAnswer, 100);
        return;
      }

      var totalChars = correctAnswer.replace(/\s/g, '').length;

      function createPlaceholder(text) {
        if (!text || text.length === 0) return '<span class="type-placeholder">_</span>';
        return text.split('').map(function (ch) {
          return ch === ' ' ? '<span class="space-hint">-</span>' : '<span class="type-placeholder">_</span>';
        }).join('');
      }
      
      function updateDisplay() {
        var typed = input.value;
        var result = '';
        var correctCount = 0;
        var maxLen = Math.max(correctAnswer.length, typed.length);

        for (var i = 0; i < maxLen; i++) {
          var correctChar = correctAnswer[i];
          var typedChar = typed[i];
          
          if (correctChar === undefined && typedChar !== undefined) {
            result += (typedChar === ' ') ? '<span class="type-space typeExtra"></span>' : '<span class="typeExtra type-char-animate">' + typedChar + '</span>';
            continue;
          }
          
          if (typedChar === undefined) {
            result += (correctChar === ' ') ? '<span class="space-hint">-</span>' : '<span class="type-placeholder">_</span>';
            continue;
          }
          
          if (correctChar === ' ') {
            result += (typedChar === ' ') ? '<span class="space-real"></span>' : '<span class="space-hint error">-</span>';
            continue;
          }
          
          if (typedChar === correctChar) {
            result += '<span class="typeGood type-char-animate">' + typedChar + '</span>';
            if(correctChar !== ' ') correctCount++;
          } else {
            result += '<span class="typeBad type-char-animate">' + typedChar + '</span>';
          }
        }
        
        overlay.innerHTML = result;
        
        if (progressBar && totalChars > 0) {
          var progress = (correctCount / totalChars) * 100;
          progressBar.style.width = progress + '%';
        }
      }
      
      // Hiển thị placeholder ban đầu
      overlay.innerHTML = '<span>' + createPlaceholder(correctAnswer) + '</span>';
      
      // Lắng nghe sự kiện 'input' để cập nhật real-time
      input.addEventListener('input', updateDisplay);
      
      // Cập nhật ngay khi có giá trị ban đầu (nếu có)
      if (input.value) {
        updateDisplay();
      }
      
      // Xử lý nút gợi ý
      if (hintButton) {
        hintButton.addEventListener('click', function() {
          var currentTyped = input.value;
          var nextIndex = currentTyped.length;
          
          if (nextIndex < correctAnswer.length) {
            var nextChar = correctAnswer[nextIndex];
            input.value += nextChar;
            updateDisplay(); // Cập nhật lại giao diện sau khi thêm gợi ý
            input.focus();
          }
        });
      }

      // Xử lý hiển thị đáp án sau khi show answer
      var typeansDiv = document.getElementById('typeans');
      var dapanDiv = document.querySelector('.dapan-dung');
      if (dapanDiv && typeansDiv) {
        var observer = new MutationObserver(function() {
          if (typeansDiv.innerHTML.trim() !== '') {
            dapanDiv.style.display = 'block';
          }
        });
        observer.observe(typeansDiv, { childList: true, subtree: true });
      }
    }
    
    // Bắt đầu khởi tạo sau khi DOM sẵn sàng
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(initTypeAnswer, 100);
      });
    } else {
      setTimeout(initTypeAnswer, 100);
    }
  })();
</script>  
      <!-- Nghĩa (edit được) + giải thích (hint) -->
      <div class="nghia">
        {{edit:meaning}}
        {{#explain}}
        <div class="giaithich">{{hint:explain}}</div>

      </div>
  
      <!-- Hình ảnh (nếu có) -->
      {{#image}}
      <div class="hinhanh">{{image}}</div>
      {{/image}}
    </main>

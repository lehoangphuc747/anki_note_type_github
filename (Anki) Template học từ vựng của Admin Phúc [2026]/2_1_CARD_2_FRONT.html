<div class="card-container card-front">
  <!-- ==================================================
       ADMIN PHÚC FROM ANKIVN
       a.k.a TIẾNG HÀN PHÚC LEE
       TRÙM DẠY ANKI
       FB: https://www.facebook.com/tui.la.phuc747/
       ================================================== -->
    <div class="card-content">
      <!-- Từ vựng tiếng Hàn -->
      <div class="tuvung">
        {{edit:word}}
        
        <!-- Phienam, loaitu, sound cùng hàng -->
        <div class="word-meta-row">
          {{#pos}}
          <div class="loaitu">{{pos}}</div>
          {{/pos}}

          {{#transliteration}}
          <div class="phienam">[{{transliteration}}]</div>
          {{/transliteration}}

          <!-- CẬP NHẬT: Thêm aria-label -->
          <div class="sound" aria-label="Phát âm từ vựng">{{audio_word}}</div>
        </div>
  
      </div>
  
    <!-- Ví dụ (nếu có) -->
    {{#example}}
      <div class="vidu-container">
        <div class="vidu-row">
          <div class="vidu">{{example}}</div>
          <!-- CẬP NHẬT: Thêm aria-label -->
          <div class="sound" aria-label="Phát âm ví dụ">{{audio_example}}</div>
        </div>
      </div>
    {{/example}}
      
      <!-- Hình ảnh -->
      {{#image}}
      <div class="hinhanh">{{image}}</div>
      {{/image}}
    </div>
  
  
    <!-- Phần header để hiển thị thông tin khóa học, sách, bài -->
    <header class="card-header">
      <span class="tag1">{{tag_1}}</span>
      <span class="tag2">> {{tag_2}}</span>
      <span class="tag3">> {{tag_3}}</span>
      <span class="tag4">> {{tag_4}}</span>
    </header>
  
    <!-- Footer: Link Facebook, thông tin hoặc branding -->
    <footer class="card-footer">
      <a class="info" href="https://www.facebook.com/tui.la.phuc747/">
        FB: Lê Hoàng Phúc (Tiếng Hàn Phúc Lee)
      </a>
    </footer>

  </div>
